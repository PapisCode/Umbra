<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Umbra | Add Item</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h2 class="mb-0">Add New Item</h2>
                </div>
                <div class="card-body">
                    <form th:action="@{/items/save}" th:object="${itemForm}" method="post" class="row g-3">

                        <div class="col-md-6">
                            <label class="form-label">Item Name</label>
                            <input type="text" th:field="*{name}" class="form-control">
                            <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">SKU</label>
                            <input type="text" th:field="*{sku}" class="form-control">
                            <div class="text-danger small" th:if="${#fields.hasErrors('sku')}" th:errors="*{sku}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Price</label>
                            <input type="number" step="0.01" th:field="*{price}" class="form-control">
                            <div class="text-danger small" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Brand</label>
                            <select th:field="*{brandId}" class="form-select">
                                <option value="">Select Brand</option>
                                <option th:each="brand : ${brands}" th:value="${brand.id}" th:text="${brand.name}"></option>
                            </select>
                            <div class="text-danger small" th:if="${#fields.hasErrors('brandId')}" th:errors="*{brandId}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Category</label>
                            <select th:field="*{categoryId}" class="form-select">
                                <option value="">Select Category</option>
                                <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
                            </select>
                            <div class="text-danger small" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
                        </div>

                        <div class="col-12">
                            <label class="form-label">Description</label>
                            <textarea th:field="*{description}" rows="4" class="form-control"></textarea>
                            <div class="text-danger small" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                        </div>

                        <div class="col-12 d-flex gap-2">
                            <button type="submit" class="btn btn-dark">Save Item</button>
                            <a th:href="@{/items}" class="btn btn-outline-secondary">Cancel</a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
