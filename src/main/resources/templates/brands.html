<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Umbra | Brands</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="fragments/navbar :: navbar"></div>

<main class="container py-5 flex-grow-1">
    <h1 class="mb-4">Brands</h1>

    <div class="row g-4">
        <div class="col-md-6 col-lg-4" th:each="brand : ${brands}">
            <div class="card shadow-sm h-100 brand-card">
                <div class="card-body">
                    <h5 class="card-title" th:text="${brand.name}">Brand Name</h5>
                    <p class="card-text text-muted">Umbra partner brand for curated apparel and streetwear collections.</p>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
