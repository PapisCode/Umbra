<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Umbra | Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<header class="hero-section text-white py-5">
    <div class="container">
        <h1 class="display-5 fw-bold">Umbra Store Dashboard</h1>
        <p class="lead">Modern streetwear inventory and catalog management built with Spring Boot and Thymeleaf.</p>
        <a th:href="@{/items}" class="btn btn-light btn-lg mt-2">View Items</a>
    </div>
</header>

<main class="container py-5">
    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card dashboard-card shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title">Total Items</h5>
                    <p class="display-6 fw-bold" th:text="${totalItems}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card dashboard-card shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title">Brands</h5>
                    <p class="display-6 fw-bold" th:text="${totalBrands}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card dashboard-card shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title">Categories</h5>
                    <p class="display-6 fw-bold" th:text="${totalCategories}">0</p>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-white">
            <h4 class="mb-0">Recently Added Items</h4>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>Name</th>
                        <th>SKU</th>
                        <th>Price</th>
                        <th>Brand</th>
                        <th>Category</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${recentItems}">
                        <td th:text="${item.name}">Name</td>
                        <td th:text="${item.sku}">SKU</td>
                        <td th:text="'$' + ${item.price}">0.00</td>
                        <td th:text="${item.brand.name}">Brand</td>
                        <td th:text="${item.category.name}">Category</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
