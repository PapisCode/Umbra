<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Umbra | Items</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0">Item Catalog</h1>
        <a th:href="@{/items/new}" class="btn btn-dark">Add New Item</a>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form method="get" th:action="@{/items}" class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Search</label>
                    <input type="text" name="keyword" class="form-control" placeholder="Name or SKU" th:value="${keyword}">
                </div>

                <div class="col-md-2">
                    <label class="form-label">Brand</label>
                    <select name="brandId" class="form-select">
                        <option value="">All Brands</option>
                        <option th:each="brand : ${brands}"
                                th:value="${brand.id}"
                                th:text="${brand.name}"
                                th:selected="${brandId != null and brand.id == brandId}">
                        </option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label class="form-label">Category</label>
                    <select name="categoryId" class="form-select">
                        <option value="">All Categories</option>
                        <option th:each="category : ${categories}"
                                th:value="${category.id}"
                                th:text="${category.name}"
                                th:selected="${categoryId != null and category.id == categoryId}">
                        </option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label class="form-label">Sort Field</label>
                    <select name="sortField" class="form-select">
                        <option value="name" th:selected="${sortField == 'name'}">Name</option>
                        <option value="price" th:selected="${sortField == 'price'}">Price</option>
                        <option value="createdAt" th:selected="${sortField == 'createdAt'}">Created At</option>
                    </select>
                </div>

                <div class="col-md-1">
                    <label class="form-label">Direction</label>
                    <select name="sortDir" class="form-select">
                        <option value="asc" th:selected="${sortDir == 'asc'}">Asc</option>
                        <option value="desc" th:selected="${sortDir == 'desc'}">Desc</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label class="form-label">Page Size</label>
                    <select name="size" class="form-select">
                        <option value="5" th:selected="${pageSize == 5}">5</option>
                        <option value="10" th:selected="${pageSize == 10}">10</option>
                    </select>
                </div>

                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-dark">Apply Filters</button>
                    <a th:href="@{/items}" class="btn btn-outline-secondary">Reset</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>SKU</th>
                        <th>Price</th>
                        <th>Brand</th>
                        <th>Category</th>
                        <th>Created</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${items}">
                        <td th:text="${item.id}">1</td>
                        <td th:text="${item.name}">Name</td>
                        <td th:text="${item.sku}">SKU</td>
                        <td th:text="'$' + ${item.price}">0.00</td>
                        <td th:text="${item.brand.name}">Brand</td>
                        <td th:text="${item.category.name}">Category</td>
                        <td th:text="${#temporals.format(item.createdAt, 'yyyy-MM-dd HH:mm')}">Date</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(items)}">
                        <td colspan="7" class="text-center text-muted">No items found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
