version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: umbra-mysql
    environment:
      MYSQL_DATABASE: umbra_db
      MYSQL_USER: umbra_user
      MYSQL_PASSWORD: umbra_password
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      timeout: 20s
      retries: 10
      interval: 10s

  app:
    build: .
    container_name: umbra-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: qa
    ports:
      - "8080:8080"

volumes:
  mysql_data: